worker_processes 1;

events { 
    worker_connections 1024; 
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        server_name taewojo.site www.taewojo.site;
        charset utf-8;

        # 정적 파일 라우팅
        location /static/ {
            alias /app/staticfiles/;
            # 아래 옵션은 필요하면 추가 (브라우저 캐싱 제어)
            # expires 30d;
            # add_header Cache-Control "public";
        }

        # (필요시) 미디어 파일 라우팅 예시
        # location /media/ {
        #     alias /app/media/;
        # }

        # 모든 요청을 Django(Gunicorn)으로 프록시
        location / {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # HTTPS server block
    server {
        listen 443 ssl;
        server_name taewojo.site www.taewojo.site;

        # --- SSL certs ---
        ssl_certificate     /etc/letsencrypt/live/taewojo.site/fullchain.pem;  # <-- replace with real path if different
        ssl_certificate_key /etc/letsencrypt/live/taewojo.site/privkey.pem;    # <-- replace with real path if different
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        charset utf-8;

        # Static files
        location /static/ {
            alias /app/staticfiles/;
        }

        # Proxy pass to Gunicorn
        location / {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
